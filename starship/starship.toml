truncation_symbol = "вЂ¦/"
style = "bold cyan"

[git_status]
format = '[\($all_status$ahead_behind\)]($style)'
style = "cyan"
conflicted = "пњї"
up_to_date = "пЃ†"
untracked = "п”©"
ahead = "в‡Ў${count}"
diverged = "в‡•в‡Ў${ahead_count}в‡Ј${behind_count}"
