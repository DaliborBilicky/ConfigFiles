[fill]
symbol = " "

[shell]
bash_indicator = 'оЇЉ'
powershell_indicator = 'оЇ‡'
style = 'white bold'
disabled = false


[username]
style_user = 'purple bold'
style_root = 'red bold'
format = '[$user]($style) '
disabled = false
show_always = true

[directory]
use_os_path_sep = false
truncation_length = 3
truncation_symbol = "вЂ¦/"
home_symbol = "пџќ ~"
read_only_style = "red"
read_only = " пЂЈ"
style = "bold green"
format = "at [$path]($style)[$read_only]($read_only_style) "

[character]
success_symbol = "[п•“](238)"
error_symbol = "[п•“](238)"

[git_branch]
symbol = "пћЎ "
format = "on [$symbol$branch]($style)"
