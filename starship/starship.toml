add_newline = true


format = """
$shell\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$java\
$python\ 
$lua\
$cmd_duration\
$time\ 
$line_break\
$character"""


# Settings which are important for me every time.
[fill]
symbol = " "


[shell]
disabled = false
style = 'fg:bright-white'
bash_indicator = '[в•ӯв•ҙ](fg:240)оҜҠ'
powershell_indicator = '[в•ӯв•ҙ](fg:240)оҜҮ'


[username]
disabled = false
show_always = true
style_user = 'fg:bright-purple'
style_root = 'fg:bright-red'
format = '[$user]($style)'


[directory]
use_os_path_sep = false
truncation_length = 3
style = "fg:bright-green"
truncation_symbol = "вҖҰ/"
home_symbol = "пҖ• ~"
read_only_style = "fg:red"
read_only = "пҖЈ "
format = " at [$read_only]($read_only_style)[$path]($style)"


[git_branch]
truncation_length = 10
style = "fg:bright-cyan"
truncation_symbol = "вҖҰ"
symbol = "пһЎ "
format = " on [$symbol$branch]($style)"


[git_status]
style = "fg:cyan"

# Github
up_to_date = "оҢҪп«ҹ"
ahead = "${count}оҢј "
diverged = "${ahead_count}оҢј ${behind_count}оҢә "
behind = "${count}оҢә "

# Local PC
untracked = "${count}п„Әо©ҝ "
conflicted = "${count}оӯ вҡ " 
modified = "${count}оӯ пЈӘ "
staged = "${count}о©ҝ "
renamed = "${count}оӯ пӘ¶ "
deleted = "${count}пҖ” "
stashed = "пЈ– "

format = '[\($all_status$ahead_behind\)]($style)'


[cmd_duration]
style = "fg:yellow"
format = " [$duration]($style)"


[time]
disabled = false
style = "fg:bright-white"
format = " [$time]($style)"


[character]
success_symbol = "[в•°в•ҙ](fg:240)[вқұ](fg:bright-green)"
error_symbol = "[в•°в•ҙ](fg:240)[вқұ](fg:bright-red)"


# Settings to add some more functionality.
[python]
style = "fg:blue"
symbol = "п ҹ "
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)'


[java]
style = "fg:bright-red"
symbol = "оңё"
format = " [${symbol} (${version})]($style)"


[lua]
style = "fg:blue"
symbol = "вҸҫ "
format = " [${symbol} (${version})]($style)"