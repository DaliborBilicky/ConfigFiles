
add_newline = true

format = """
[в•ӯв•ҙ](238)$shell\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$java\
$python\
$cmd_duration $time\ 
$line_break\
[в•°в”Җ](238)$character"""

[fill]
symbol = " "

[shell]
bash_indicator = 'оҜҠ'
powershell_indicator = 'оҜҮ'
style = 'white bold'
disabled = false


[username]
style_user = 'purple bold'
style_root = 'red bold'
format = '[$user]($style) '
disabled = false
show_always = true

[directory]
use_os_path_sep = false
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "пҖ• ~"
read_only_style = "red"
read_only = " пҖЈ"
style = "bold green"
format = "at [$path]($style)[$read_only]($read_only_style) "

[character]
success_symbol = "[п•“](238)"
error_symbol = "[п•“](238)"

[git_branch]
symbol = "пһЎ "
format = "on [$symbol$branch]($style)"
truncation_length = 4
truncation_symbol = "вҖҰ"
style = "bold cyan"

[git_status]
format = '[\($all_status$ahead_behind\)]($style)'
style = "cyan"

up_to_date = "пҷҹ "
ahead = "пҷҰ ${count}"
diverged = "пҷҰ ${ahead_count}пҷЎ ${behind_count}"
behind = "пҷЎ ${count}"

conflicted = "п„Әоӯ  " 
stashed = "пЈ– "
modified = "оӯ пЈӘ "
untracked = "п„Әо©ҝ "
staged = "о©ҝ "
renamed = "оӯ пӘ¶ "
deleted = "пҖ” "

[python]
symbol = "п ҹ "
style = "blue"
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\) )]($style)'

[java]
symbol = "оңё"
style = "bold red"
format = "[${symbol} (${version} )]($style)"

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"

[time]
disabled = false
style = "white"
format = "[$time]($style)"
