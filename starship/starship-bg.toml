add_newline = true

format = """
$shell\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$java\
$python\ 
$lua\
$cmd_duration\
$time\ 
$line_break\
$character"""

[fill]
symbol = " "

## Prompt with bg colors
[shell]
disabled = false
style = 'bg:green fg:0'
bash_indicator = 'оЇЉ '
powershell_indicator = 'оЇ‡ '
format = '[о‚¶](fg:green)[$indicator]($style)'


[username]
disabled = false
show_always = true
style_user = 'bg:green fg:0'
style_root = 'bg:green fg:white'
format = '(bg:gree)[$user]($style)'

[directory]
use_os_path_sep = false
truncation_length = 3
style = "fg:0 bg:bright-green"
truncation_symbol = "вЂ¦/"
home_symbol = "пЂ• ~"
read_only_style = "fg:0 bg:bright-green"
read_only = " пЂЈ"
format = "[о‚°](fg:green bg:bright-green)[$path]($style)[$read_only]($read_only_style)[о‚ґ](fg:bright-green)"

[git_branch]
truncation_length = 10
style = "fg:0 bg:cyan"
truncation_symbol = "вЂ¦"
symbol = "пћЎ "
format = " [о‚¶](fg:cyan)[$symbol$branch]($style)"

[git_status]
style = "fg:0 bg:bright-cyan"

#github
up_to_date = "оЊЅпЂЊ"
ahead = "${count}оЊј "
diverged = "${ahead_count}оЊј ${behind_count}оЊє "
behind = "${count}оЊє "

#local
untracked = "${count}п„Єо©ї "
conflicted = "${count}о­ вљ " 
modified = "${count}о­ пЈЄ "
staged = "${count}о©ї "
renamed = "${count}о­ пЄ¶ "
deleted = "${count}пЂ” "
stashed = "пЈ– "

format = '[о‚°](fg:cyan bg:bright-cyan)[\($all_status$ahead_behind\)]($style)[о‚ґ](fg:bright-cyan)'

[python]
style = "bg:blue"
symbol = "п џ "
format = '[о‚¶](fg:blue)[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)[о‚ґ](fg:blue)'

[java]
style = "bg:red"
symbol = "оњё "
format = " [о‚¶](fg:red)[${symbol}(${version})]($style)[о‚ґ](fg:red)"

[lua]
style = "fg:0 bg:blue"
symbol = "вЏѕ "
format = " [о‚¶](fg:blue)[${symbol}(${version})]($style)[о‚ґ](fg:blue)"

[cmd_duration]
style = "fg:0 bg:yellow"
format = " [о‚¶](fg:yellow)[$duration]($style)[о‚ґ](fg:yellow)"

[time]
disabled = false
style = "fg:0 bg:purple"
format = " [о‚¶](fg:purple)[$time]($style)[о‚ґ](fg:purple)"

[character]
success_symbol = "[ в•°п•“](8)"
error_symbol = "[ в•°п•“](8)"